name: Executar e Publicar Dashboard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar e Converter Notebook (Indicadores)
        run: |
          jupyter nbconvert --clear-output --inplace analytics/dashboard.ipynb
          jupyter nbconvert --to notebook --execute analytics/dashboard.ipynb --inplace
          mkdir -p docs
          jupyter nbconvert --to markdown analytics/dashboard.ipynb --no-input --output-dir docs/
          
          mv docs/dashboard.md docs/indicadores.md

      - name: Deploy MkDocs (GitHub Pages)
        run: |
          mkdocs gh-deploy --force
