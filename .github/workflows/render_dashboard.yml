
name: Executar e Publicar Dashboard

on:
  push:
    branches: [ dashboard ] 

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install pandas numpy plotly nbconvert ipykernel mkdocs-material matplotlib requests

      - name: Gerar Dashboard Automático
        run: |
          jupyter nbconvert --execute --to html docs/projeto/dashboard.ipynb --no-input --output indicadores --output-dir docs/projeto/

      - name: Deploy MkDocs
        run: |
          mkdocs gh-deploy --force