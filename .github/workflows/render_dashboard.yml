name: Executar e Publicar Dashboard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          ref: main 

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gerar Dados do ZenHub (Analytics JSON)
        env:
          ZENHUB_TOKEN: ${{ secrets.ZENHUB_TOKEN }}
        run: |
          python generate_dashboard_data.py

      - name: Commit e Push dos Dados e Anotações Atualizadas
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add zenhub_analytics.json analytics/raw-data/zenhub_analytics.json historico_analises/ || true
          
          if ! git diff --cached --quiet; then
            git commit -m "bot: dados do zenhub e históricos de análises atualizados [skip ci]"
            git push origin main
          else
            echo "Nenhuma alteração de dados detectada."
          fi

      - name: Deploy MkDocs (GitHub Pages)
        run: |
          mkdocs gh-deploy --force